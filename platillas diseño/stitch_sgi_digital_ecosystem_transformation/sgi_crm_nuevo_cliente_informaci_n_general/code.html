<button class="px-6 py-3 font-label-md text-label-md border-b-2 border-transparent text-on-surface-variant hover:text-on-surface transition-colors">
                        Contratos

<button class="px-6 py-3 font-label-md text-label-md border-b-2 border-transparent text-on-surface-variant hover:text-on-surface transition-colors">

<!-- Grid Layout for Inputs -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-gutter gap-y-6">
<!-- Identificación -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant">Identificación *</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">badge</span>
</div>
<input class="form-input w-full pl-10 pr-4 py-2.5 rounded-lg text-body-md placeholder-outline-variant" placeholder="Ej. 900123456" required="" type="text"/>
</div>
</div>
<!-- Dígito de verificación -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant">Dígito de verificación</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">pin</span>
</div>
<input class="form-input w-full pl-10 pr-4 py-2.5 rounded-lg text-body-md placeholder-outline-variant" placeholder="Ej. 1" type="text"/>
</div>
</div>
<!-- Nombre completo -->
<div class="flex flex-col gap-2 md:col-span-2">
<label class="font-label-md text-label-md text-on-surface-variant">Nombre completo o Razón Social *</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">domain</span>
</div>
<input class="form-input w-full pl-10 pr-4 py-2.5 rounded-lg text-body-md placeholder-outline-variant" placeholder="Ej. Empresa Tecnológica S.A.S" required="" type="text"/>
</div>
</div>
<!-- Teléfono -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant">Teléfono</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">phone</span>
</div>
<input class="form-input w-full pl-10 pr-4 py-2.5 rounded-lg text-body-md placeholder-outline-variant" placeholder="+57 (___) _______" type="tel"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="form-input w-full pl-10 pr-4 py-2.5 rounded-lg text-body-md placeholder-outline-variant" placeholder="contacto@empresa.com" type="email"/>
</div>
</div>
<!-- Dirección -->
<div class="flex flex-col gap-2 md:col-span-2">
<label class="font-label-md text-label-md text-on-surface-variant">Dirección</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">location_on</span>
</div>
<input class="form-input w-full pl-10 pr-4 py-2.5 rounded-lg text-body-md placeholder-outline-variant" placeholder="Cra 15 # 93 - 60, Piso 5" type="text"/>
</div>
</div>
<!-- Ciudad (Dropdown) -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant">Ciudad</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none z-10">
<span class="material-symbols-outlined text-outline">location_city</span>
</div>
<select class="form-input w-full pl-10 pr-10 py-2.5 rounded-lg text-body-md appearance-none">
<option disabled="" selected="" value="">Seleccione una ciudad</option>
<option value="bogota">Bogotá, D.C.</option>
<option value="medellin">Medellín</option>
<option value="cali">Cali</option>
<option value="barranquilla">Barranquilla</option>
</select>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">expand_more</span>
</div>
</div>
</div>
<!-- Página web -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant">Página web</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">language</span>
</div>
<input class="form-input w-full pl-10 pr-4 py-2.5 rounded-lg text-body-md placeholder-outline-variant" placeholder="https://www.empresa.com" type="url"/>
</div>
</div>
<!-- Fecha de ingreso (Datepicker) -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant">Fecha de ingreso</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">calendar_today</span>
</div>
<input class="form-input w-full pl-10 pr-4 py-2.5 rounded-lg text-body-md text-on-surface" type="date"/>
</div>
</div>
<!-- ¿Activo? Toggle -->
<div class="flex flex-col gap-2 justify-center">
<label class="font-label-md text-label-md text-on-surface-variant mb-1">Estado</label>
<div class="flex items-center gap-3">
<div class="relative inline-block w-12 mr-2 align-middle select-none">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer opacity-0" id="active-toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer" for="active-toggle"></label>
</div>
<span class="font-body-sm text-body-sm text-on-surface">¿Activo?</span>
</div>
</div>
</div>
<div class="w-full flex justify-center mt-6">
<img alt="Reference Bottom" class="h-16 object-contain opacity-50" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDV6oHkeChn7wzRXaFVz3kUwzpRosR2ggHQQCNW0zVXw6DqEZgd_vBG0qj5NKwePnzZxsDPY4sXhz9b34UDHJpUBpVCog8tGnZpcgWPqnZtUeJ6k18Xe35NwE47UQcwklkykUJCh7ZeranwdEAkgFj5cHypXF-O4LbpMOTUKnkCkXm9SRvUZw8K-xoFds7sF8jDGBNy_x8B2OB0uqSIAsfZ6pyGlOb3Wspwe0Qz9e12BgrpItNNd_J3KsuhykfiMbB4hQ"/>

<span class="material-symbols-outlined text-[18px]">save</span>
                                Guardar
                            </button>
</div>
